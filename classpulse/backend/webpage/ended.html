<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassPulse | Session Ended</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F8FAFC;
            color: #1E293B;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }
        .icon-circle {
            width: 100px; height: 100px;
            background: rgba(16,185,129,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
        }
        .icon-circle span { font-size: 48px; }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1E293B;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 15px;
            color: #64748B;
            font-weight: 500;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 20px 28px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 340px;
        }
        .card-title {
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 15px;
            font-weight: 700;
            color: #10B981;
        }

        .back-btn {
            background: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            color: #1E293B;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 40px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .back-btn:active { transform: scale(0.97); background: #F1F5F9; }
    </style>
</head>
<body>
    <div class="icon-circle"><span>🏆</span></div>
    <h1>Session Complete</h1>
    <p class="subtitle">Great participation today!</p>

    <div class="card">
        <div class="card-title">Status</div>
        <div class="card-value">✅ Completed Successfully</div>
    </div>

    <button onclick="window.location.href='index.html'" class="back-btn">
        Back to Home
    </button>

    <script>localStorage.clear();</script>
</body>
</html>
