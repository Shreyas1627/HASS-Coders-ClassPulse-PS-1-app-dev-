<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassPulse | Join</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #F8FAFC;
            color: #1E293B;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            user-select: none;
            overflow: hidden;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Header - matches Flutter AppBar */
        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #2563EB;
            letter-spacing: -0.5px;
        }
        .scan-btn {
            background: #F1F5F9;
            border: 1.5px solid #CBD5E1;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scan-btn:active { transform: scale(0.95); background: #E2E8F0; }
        .scan-btn svg { width: 20px; height: 20px; color: #2563EB; }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        .subtitle {
            font-size: 17px;
            font-weight: 500;
            color: #64748B;
            letter-spacing: 0.3px;
            margin-bottom: 28px;
        }

        /* PIN boxes - matches Flutter PinDisplay */
        .pin-row {
            display: flex;
            gap: 14px;
            margin-bottom: 40px;
        }
        .otp-box {
            width: 62px;
            height: 76px;
            background: #F1F5F9;
            border: 2px solid #CBD5E1;
            border-radius: 14px;
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #2563EB;
            outline: none;
            transition: all 0.2s;
        }
        .otp-box.active {
            border-color: #2563EB;
            background: #EFF6FF;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .otp-box.filled {
            border-color: #2563EB;
            background: rgba(37,99,235,0.06);
        }

        /* Numpad - matches Flutter Numpad */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px 24px;
            margin-bottom: 32px;
            max-width: 300px;
        }
        .num-key {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #E2E8F0;
            border: none;
            font-size: 22px;
            font-weight: 800;
            color: #1E293B;
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .num-key:active { background: #CBD5E1; transform: scale(0.93); }
        .num-key.empty { background: transparent; pointer-events: none; }
        .num-key.backspace {
            background: transparent;
            font-size: 0;
        }
        .num-key.backspace svg { width: 26px; height: 26px; color: #64748B; }

        /* Join button - matches Flutter button */
        .join-btn {
            width: 100%;
            max-width: 340px;
            height: 54px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.3px;
        }
        .join-btn.disabled {
            background: #CBD5E1;
            color: #94A3B8;
            cursor: default;
        }
        .join-btn.enabled {
            background: #2563EB;
            color: white;
            box-shadow: 0 4px 14px rgba(37,99,235,0.3);
        }
        .join-btn.enabled:active { transform: scale(0.98); }

        /* QR Scanner Overlay - matches Flutter ScannerOverlay */
        .qr-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(15,23,42,0.96);
            backdrop-filter: blur(12px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .qr-overlay.visible { display: flex; }

        .qr-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 28px;
        }
        .qr-border {
            position: absolute;
            inset: -6px;
            border: 3px solid #2563EB;
            border-radius: 32px;
            z-index: 10;
            pointer-events: none;
            clip-path: polygon(
                0 0, 25% 0, 25% 8%, 8% 8%, 8% 25%, 0 25%, 0 0,
                75% 0, 75% 8%, 92% 8%, 92% 25%, 100% 25%, 100% 0,
                100% 100%, 75% 100%, 75% 92%, 92% 92%, 92% 75%, 100% 75%, 100% 100%,
                0 100%, 0 75%, 8% 75%, 8% 92%, 25% 92%, 25% 100%, 0 100%
            );
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #2563EB, transparent);
            box-shadow: 0 0 12px #2563EB;
            top: 0;
            z-index: 5;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .scan-status {
            color: white;
            font-weight: 600;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .overlay-btn-group {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .overlay-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .overlay-btn:active { transform: scale(0.97); }
        .overlay-btn.primary { background: white; color: #2563EB; }
        .overlay-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">ClassPulse</span>
        <button id="startScanBtn" class="scan-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
        </button>
    </div>

    <div class="main">
        <p class="subtitle">Enter Session Code</p>

        <div class="pin-row">
            <input type="text" class="otp-box" readonly maxlength="1">
            <input type="text" class="otp-box" readonly maxlength="1">
            <input type="text" class="otp-box" readonly maxlength="1">
            <input type="text" class="otp-box" readonly maxlength="1">
        </div>

        <div class="numpad">
            <button class="num-key">1</button>
            <button class="num-key">2</button>
            <button class="num-key">3</button>
            <button class="num-key">4</button>
            <button class="num-key">5</button>
            <button class="num-key">6</button>
            <button class="num-key">7</button>
            <button class="num-key">8</button>
            <button class="num-key">9</button>
            <button class="num-key empty"></button>
            <button class="num-key">0</button>
            <button id="backspace" class="num-key backspace">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/>
                    <line x1="12" y1="9" x2="18" y2="15"/>
                </svg>
            </button>
        </div>

        <button id="joinBtn" class="join-btn disabled" disabled>Join Session</button>
    </div>

    <div id="qrOverlay" class="qr-overlay">
        <div class="qr-wrapper">
            <div class="qr-border"></div>
            <div class="scan-line"></div>
            <div id="reader" style="width:100%;height:100%;background:#0a0a0a;"></div>
        </div>
        <p id="scanStatus" class="scan-status">Align QR Code to scan</p>
        <div class="overlay-btn-group">
            <button id="uploadQrBtn" class="overlay-btn primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
                Upload from Gallery
            </button>
            <button id="closeScanner" class="overlay-btn secondary">CANCEL</button>
        </div>
        <input type="file" id="qrFileInput" accept="image/*" style="display:none;">
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
