<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassPulse | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Professional QR Finder Frame */
        .qr-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .qr-border {
            position: absolute;
            inset: -8px;
            border: 4px solid #2563EB;
            border-radius: 40px;
            z-index: 10;
            pointer-events: none;
            clip-path: polygon(
                0 0, 25% 0, 25% 8%, 8% 8%, 8% 25%, 0 25%, 0 0,
                75% 0, 75% 8%, 92% 8%, 92% 25%, 100% 25%, 100% 0,
                100% 100%, 75% 100%, 75% 92%, 92% 92%, 92% 75%, 100% 75%, 100% 100%,
                0 100%, 0 75%, 8% 75%, 8% 92%, 25% 92%, 25% 100%, 0 100%
            );
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #2563EB, transparent);
            box-shadow: 0 0 15px #2563EB;
            top: 0;
            z-index: 5;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] h-screen flex flex-col font-sans no-select overflow-hidden">

    <header class="p-6 flex justify-between items-center w-full max-w-md mx-auto">
        <h1 class="text-2xl font-black text-[#2563EB]">ClassPulse</h1>
        <button id="startScanBtn" class="bg-[#EBF2FF] p-3 rounded-2xl active:scale-95 transition-all border border-blue-100 shadow-sm">
            <img src="https://img.icons8.com/ios-filled/50/2563EB/qr-code.png" class="w-6 h-6" alt="Scan">
        </button>
    </header>

    <div class="flex-1 flex flex-col items-center justify-center px-6 w-full max-w-md mx-auto">
        <p class="text-[#64748B] font-bold text-lg mb-8 tracking-tight">Enter Session Code</p>

        <div class="flex gap-3 mb-12">
            <input type="number" class="otp-box w-16 h-20 bg-white border-2 border-[#E2E8F0] rounded-2xl text-center text-3xl font-black text-[#2563EB] shadow-sm transition-all" readonly>
            <input type="number" class="otp-box w-16 h-20 bg-white border-2 border-[#E2E8F0] rounded-2xl text-center text-3xl font-black text-[#2563EB] shadow-sm transition-all" readonly>
            <input type="number" class="otp-box w-16 h-20 bg-white border-2 border-[#E2E8F0] rounded-2xl text-center text-3xl font-black text-[#2563EB] shadow-sm transition-all" readonly>
            <input type="number" class="otp-box w-16 h-20 bg-white border-2 border-[#E2E8F0] rounded-2xl text-center text-3xl font-black text-[#2563EB] shadow-sm transition-all" readonly>
        </div>

        <div class="grid grid-cols-3 gap-x-10 gap-y-5 mb-12">
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">1</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">2</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">3</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">4</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">5</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">6</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">7</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">8</button>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">9</button>
            <div class="w-20 h-20"></div>
            <button class="num-key w-20 h-20 rounded-full bg-[#EBF2FF] text-[#1E293B] text-2xl font-black active:bg-blue-200">0</button>
            <button id="backspace" class="w-20 h-20 rounded-full flex items-center justify-center active:bg-gray-200">
                <img src="https://img.icons8.com/ios-glyphs/60/64748B/backspace.png" class="w-8 h-8">
            </button>
        </div>

        <button id="joinBtn" class="w-full bg-[#2563EB]/30 text-white font-black py-5 rounded-[2rem] text-xl transition-all shadow-sm" disabled>
            Join Session
        </button>
    </div>

    <div id="qrOverlay" class="hidden fixed inset-0 z-50 bg-[#0F172A]/95 backdrop-blur-md flex flex-col items-center justify-center p-6">
        
        <div class="qr-wrapper shadow-2xl mb-8">
            <div class="qr-border"></div>
            <div class="scan-line"></div>
            <div id="reader" class="w-full h-full object-cover bg-gray-950"></div>
        </div>
        
        <p id="scanStatus" class="text-white font-bold tracking-tight text-center mb-8">Align QR Code to scan</p>
        
        <div class="w-full max-w-xs space-y-4">
            <button id="uploadQrBtn" class="w-full bg-white text-[#2563EB] py-4 rounded-[1.5rem] font-bold shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                <img src="https://img.icons8.com/ios-filled/50/2563EB/image.png" class="w-5 h-5">
                Upload from Gallery
            </button>
            
            <button id="closeScanner" class="w-full bg-white/10 text-white border border-white/20 py-4 rounded-[1.5rem] font-bold uppercase text-xs tracking-widest active:scale-95 transition-all">
                Cancel
            </button>
        </div>

        <input type="file" id="qrFileInput" accept="image/*" class="hidden">
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
